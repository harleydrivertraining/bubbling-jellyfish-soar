# Codemagic CI/CD configuration for Capacitor
# Documentation: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play # Define these in Codemagic UI
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync android
      - name: Build Android Release
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/bundle/**/*.aab

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # Define these in Codemagic UI
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Build web assets
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Set up keychain and fetch signing files
        script: |
          keychain initialize
          # Fetch certificates and profiles for your specific bundle ID
          app-store-connect fetch-signing-files "com.hdt.app" --type IOS_APP_STORE --create
          keychain add-certificates
      - name: Install CocoaPods
        script: |
          cd ios/App && pod install
      - name: Apply Provisioning Profiles
        script: |
          # This command maps the downloaded profiles to your Xcode project
          xcode-project use-profiles --workspace ios/App/App.xcworkspace
      - name: Build iOS
        script: |
          # Build the IPA using the profiles applied in the previous step
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com # Update this